<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yt AI companion</title>
    <link rel="stylesheet" href="./ui.css" />
  </head>
  <body>
    <!-- header -->
    <header id="header">
      <div class="brand-mark"></div>
      <div class="who"><b>Yt AI companion</b></div>
    </header>

    <!-- now watching -->
    <div class="watching">
      <div class="thumb">
        <img id="video-thumb" alt="" hidden />
      </div>
      <div class="info">
        <span id="video-title">Open a YouTube video</span>
        <span id="transcript-status" class="status">Waiting…</span>
      </div>
      <div class="dur" id="video-dur" hidden></div>
    </div>

    <!-- tabs -->
    <nav id="tabs">
      <button class="tab" data-mode="summarize">
        <span class="ti"
          ><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
            <line x1="3" y1="4" x2="13" y2="4" />
            <line x1="3" y1="8" x2="13" y2="8" />
            <line x1="3" y1="12" x2="9" y2="12" /></svg
        ></span>
        Summary
      </button>
      <button class="tab" data-mode="query">
        <span class="ti"
          ><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round">
            <path d="M2.6 3.8h10.8v7H7l-2.8 2.4V10.8H2.6z" /></svg
        ></span>
        Chat
      </button>
      <button class="tab" data-mode="review">
        <span class="ti"
          ><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="8" cy="8" r="5.6" />
            <path d="M6.3 6.2c0-.95.76-1.6 1.7-1.6s1.7.65 1.7 1.5c0 1.4-1.7 1.25-1.7 2.6" />
            <circle cx="8" cy="10.9" r=".15" /></svg
        ></span>
        Quiz
      </button>
      <span class="tab-ink" id="tab-ink"></span>
    </nav>

    <!-- Each YouTube tab gets its own clone of these panels (see sidepanel/tabs.ts),
         so background work survives tab switches. #content is just the mount point
         for the active tab's clone. -->
    <main id="content"></main>

    <template id="panel-tpl">
      <!-- ============ SUMMARY ============ -->
      <section class="panel is-empty" data-panel="summarize">
        <div class="empty" data-empty>
          <div class="hero"><span class="spark"></span></div>
          <div><h4>Summarize this video</h4></div>
          <p>Get the gist in seconds — a tight TL;DR plus the key points worth remembering.</p>
          <button class="btn" id="run-summary"><span class="spark"></span> Summarize video</button>
        </div>

        <div class="status-wrap" data-status>
          <div class="status-card">
            <div class="status-row">
              <div class="status-orb"></div>
              <div class="status-txt"><b class="stxt">Loading model…</b><span class="ssub">Warming up the summarizer</span></div>
              <div class="status-count">1/3</div>
            </div>
            <div class="status-track"><i></i><i></i><i></i></div>
          </div>
        </div>
        <div class="skel" data-skel>
          <div class="sk t"></div>
          <div class="sk block"></div>
          <div class="sk"></div>
          <div class="sk s"></div>
          <div class="sk"></div>
          <div class="sk xs"></div>
        </div>

        <div class="scroll" data-result>
          <div class="reveal-sum">
            <div class="sum-top"><h3>Summary</h3><span class="chiplet" id="summary-chiplet"></span></div>
            <div class="markdown" id="summary-output"></div>
          </div>
        </div>
        <div class="foot" data-foot>
          <button class="btn ghost" id="regen-summary">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
              <path d="M11.5 6A4.6 4.6 0 1 0 11 9" />
              <path d="M11.5 2.2V6H7.8" />
            </svg>
            Regenerate
          </button>
          <button class="btn" id="copy-summary">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round">
              <rect x="4.4" y="4.4" width="7.2" height="7.2" rx="1.6" />
              <path d="M9.4 4.4V3a1.6 1.6 0 0 0-1.6-1.6H3A1.6 1.6 0 0 0 1.4 3v4.8A1.6 1.6 0 0 0 3 9.4h1.4" />
            </svg>
            Copy summary
          </button>
        </div>
      </section>

      <!-- ============ CHAT ============ -->
      <section class="panel" data-panel="query" hidden>
        <div class="chat" id="chat">
          <div class="intro">
            <div class="av"></div>
            <div class="txt">
              I've read the full transcript of this video. Ask me anything — I'll point you to the exact moments I'm drawing from.
            </div>
          </div>
        </div>
        <form class="composer" id="query-form">
          <div class="field-wrap">
            <textarea id="query-input" rows="1" placeholder="Ask anything about this video…" autocomplete="off"></textarea>
          </div>
          <button class="clear" id="query-clear" type="button" title="Clear conversation">Clear</button>
          <button class="send" id="query-send" type="submit" disabled aria-label="Send">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 8 2.5 2.6 4.4 8 2.5 13.4z" />
              <path d="M4.4 8H14" />
            </svg>
          </button>
        </form>
      </section>

      <!-- ============ QUIZ ============ -->
      <section class="panel is-empty" data-panel="review" hidden>
        <div class="empty" data-empty>
          <div class="hero"><span class="spark"></span></div>
          <div><h4>Test your understanding</h4></div>
          <p>A quick auto-generated quiz on the main ideas, with explanations for every answer.</p>
          <button class="btn" id="run-quiz"><span class="spark"></span> Generate quiz</button>
        </div>

        <div class="status-wrap" data-status>
          <div class="status-card">
            <div class="status-row">
              <div class="status-orb"></div>
              <div class="status-txt"><b class="stxt">Generating questions…</b><span class="ssub">Pulling key concepts from the transcript</span></div>
              <div class="status-count">1/2</div>
            </div>
            <div class="status-track"><i></i><i></i></div>
          </div>
        </div>
        <div class="skel" data-skel>
          <div class="sk block"></div>
          <div class="sk block"></div>
        </div>

        <div class="scroll" data-result>
          <div class="quiz-list" id="quiz-output"></div>
        </div>
        <div class="quiz-score" data-score id="quiz-score">
          <span class="lbl" id="quiz-score-txt">0 / 0 answered</span>
          <div class="bar"><i id="quiz-score-bar"></i></div>
        </div>
      </section>
    </template>

    <!-- toast -->
    <div class="toast" id="toast">
      <svg class="tick" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2.5 7.5 6 11l5.5-7" />
      </svg>
      Summary copied
    </div>

    <div id="banner" class="banner" hidden></div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
